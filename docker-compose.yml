services:
  db:
    image: postgres:16-alpine
    container_name: imagegen-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: imagegen
    ports:
      - "5432:5432"
    volumes:
      - imagegen-pgdata:/var/lib/postgresql/data

volumes:
  imagegen-pgdata:
